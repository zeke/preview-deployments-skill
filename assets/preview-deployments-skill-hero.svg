<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Preview deployments for Cloudflare apps</title>
  <desc id="desc">A 16:9 graphic showing a GitHub pull request flowing through GitHub Actions into Cloudflare Workers, with deployment status shown in the pull request and a repeat loop for updates.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFBF5"/>
      <stop offset="1" stop-color="#FEF0DD"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF8A3D"/>
      <stop offset="1" stop-color="#FF4801"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#521000" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#FF4801"/>
    </marker>
    <style>
      .sans { font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; }
      .brown { fill: #521000; }
      .muted { fill: rgba(82, 16, 0, 0.62); }
      .card { fill: #FFFDFB; stroke: #EBD5C1; stroke-width: 2; }
      .tiny { font-size: 24px; }
      .small { font-size: 30px; }
      .medium { font-size: 38px; font-weight: 500; }
      .large { font-size: 72px; font-weight: 500; letter-spacing: -0.04em; }
      .tag { fill: #FEF7ED; stroke: #EBD5C1; stroke-width: 2; }
      .orangeText { fill: #FF4801; }
      .line { fill: none; stroke: #FF4801; stroke-width: 7; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
      .softLine { fill: none; stroke: rgba(82, 16, 0, 0.16); stroke-width: 2; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="138" cy="128" r="78" fill="#FF4801" opacity="0.08"/>
  <circle cx="1456" cy="746" r="130" fill="#FF4801" opacity="0.08"/>
  <path d="M110 790 C340 650 470 824 660 694 C840 572 930 650 1068 540 C1224 416 1342 474 1500 330" class="softLine"/>

  <text x="96" y="112" class="sans muted small">preview-deployments-skill</text>
  <text x="96" y="184" class="sans brown" font-size="66" font-weight="500" letter-spacing="-0.04em">Pull request previews</text>
  <text x="96" y="252" class="sans brown" font-size="66" font-weight="500" letter-spacing="-0.04em">without PR comments</text>
  <text x="100" y="314" class="sans muted small">GitHub Actions + Cloudflare Workers + GitHub Deployments API</text>

  <g transform="translate(105 388)" filter="url(#shadow)">
    <rect class="card" width="310" height="260" rx="26"/>
    <rect x="22" y="22" width="266" height="64" rx="32" fill="#24292F"/>
    <text x="96" y="63" class="sans" fill="#FFFBF5" font-size="30" font-weight="500">GitHub</text>
    <circle cx="58" cy="54" r="22" fill="#FFFBF5"/>
    <path d="M48 59c-9-8-9-24 4-30 8-4 18-2 25 5 10 10 8 28-5 34v16h-9V68h-10v16h-9V67c-4-1-8-4-12-8" fill="#24292F" opacity="0.92"/>
    <text x="28" y="126" class="mono orangeText tiny">pull request #42</text>
    <g transform="translate(34 154)">
      <circle cx="24" cy="20" r="12" fill="#FF4801"/>
      <circle cx="24" cy="86" r="12" fill="#FF4801"/>
      <path d="M24 32v42" stroke="#FF4801" stroke-width="8" stroke-linecap="round"/>
      <path d="M24 32 C88 36 82 70 132 70" fill="none" stroke="#FF4801" stroke-width="8" stroke-linecap="round"/>
      <circle cx="148" cy="70" r="12" fill="#FF4801"/>
    </g>
    <text x="112" y="207" class="sans brown medium">open or update</text>
    <text x="112" y="241" class="sans muted tiny">new commit cancels old run</text>
  </g>

  <path d="M445 516 C515 516 543 516 606 516" class="line"/>

  <g transform="translate(638 388)" filter="url(#shadow)">
    <rect class="card" width="324" height="260" rx="26"/>
    <rect x="28" y="26" width="116" height="46" rx="23" fill="#FEF7ED" stroke="#EBD5C1" stroke-width="2"/>
    <text x="56" y="58" class="mono orangeText tiny">YAML</text>
    <text x="30" y="118" class="sans brown medium">GitHub Actions</text>
    <text x="30" y="157" class="sans muted tiny">checkout • setup-node • wrangler</text>
    <g transform="translate(42 184)">
      <rect x="0" y="0" width="240" height="40" rx="20" fill="url(#orange)"/>
      <text x="32" y="27" class="mono" fill="#FFFBF5" font-size="20">deploy preview</text>
      <path d="M196 14h18m-9-9v18" stroke="#FFFBF5" stroke-width="4" stroke-linecap="round"/>
    </g>
  </g>

  <path d="M994 516 C1064 516 1092 516 1154 516" class="line"/>

  <g transform="translate(1188 388)" filter="url(#shadow)">
    <rect class="card" width="310" height="260" rx="26"/>
    <g transform="translate(68 24) scale(0.72)">
      <path d="M90 46c13-24 47-31 69-12 9 8 15 19 16 32 22 3 39 22 39 45 0 25-20 45-45 45H64c-30 0-54-24-54-54 0-28 22-52 50-54 8-1 18 0 30-2z" fill="url(#orange)"/>
      <path d="M92 48c11-16 33-21 50-10 7 5 12 12 15 21 7-2 15-2 22 0-5-20-21-36-42-40-20-4-39 7-45 29z" fill="#FFB07A" opacity="0.85"/>
    </g>
    <text x="34" y="142" class="sans brown" font-size="35" font-weight="500">Cloudflare Workers</text>
    <text x="34" y="181" class="mono orangeText" font-size="20">app-pr-42.ziki.workers.dev</text>
    <rect x="34" y="202" width="244" height="36" rx="18" class="tag"/>
    <text x="58" y="226" class="mono muted" font-size="19">ephemeral Worker</text>
  </g>

  <g transform="translate(492 710)">
    <rect x="0" y="0" width="616" height="82" rx="41" fill="#FFFDFB" stroke="#EBD5C1" stroke-width="2"/>
    <circle cx="48" cy="41" r="20" fill="#FF4801"/>
    <path d="M39 42l7 7 14-18" fill="none" stroke="#FFFBF5" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="88" y="50" class="sans brown small">GitHub Deployment: </text>
    <text x="370" y="50" class="mono orangeText tiny">preview/pr-42</text>
  </g>

  <path d="M1320 370 C1266 292 1128 266 1020 306 C928 340 874 318 820 278" class="line" opacity="0.56"/>
  <text x="1040" y="272" class="sans muted tiny">repeat on every push</text>

  <g transform="translate(107 694)">
    <rect width="304" height="96" rx="48" fill="#FFFDFB" stroke="#EBD5C1" stroke-width="2"/>
    <text x="38" y="43" class="mono orangeText tiny">closed or merged</text>
    <text x="38" y="72" class="sans muted tiny">delete Worker • mark inactive</text>
  </g>

  <text x="96" y="846" class="sans muted tiny">Per-PR subdomains, scoped cleanup, and native deployment status in the GitHub pull request UI.</text>
</svg>

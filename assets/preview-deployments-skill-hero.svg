<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">GitHub pull requests to Cloudflare preview deployments</title>
  <desc id="desc">A simple 16:9 graphic with a GitHub logo, pull request icon, and Cloudflare logo representing preview deployments.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFBF5"/>
      <stop offset="1" stop-color="#FEF0DD"/>
    </linearGradient>
    <linearGradient id="cf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF9A43"/>
      <stop offset="1" stop-color="#FF4801"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#521000" flood-opacity="0.12"/>
    </filter>
    <style>
      .sans { font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; }
      .brown { fill: #521000; }
      .muted { fill: rgba(82,16,0,0.62); }
      .card { fill: #FFFDFB; stroke: #EBD5C1; stroke-width: 2; }
      .accent { fill: #FF4801; }
      .line { fill: none; stroke: #FF4801; stroke-width: 10; stroke-linecap: round; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="160" cy="160" r="92" fill="#FF4801" opacity="0.07"/>
  <circle cx="1436" cy="718" r="132" fill="#FF4801" opacity="0.08"/>

  <text x="800" y="150" text-anchor="middle" class="sans brown" font-size="64" font-weight="500" letter-spacing="-0.035em">Pull request preview deployments</text>
  <text x="800" y="206" text-anchor="middle" class="sans muted" font-size="30">GitHub Actions + GitHub Deployments API + Cloudflare Workers</text>

  <g transform="translate(162 320)" filter="url(#shadow)">
    <rect class="card" width="340" height="260" rx="36"/>
    <circle cx="170" cy="112" r="72" fill="#24292F"/>
    <path d="M170 50c-35 0-63 28-63 63 0 28 18 52 44 60 3 1 5-1 5-4v-22c-18 4-22-8-22-8-3-8-8-10-8-10-7-5 1-5 1-5 8 1 12 8 12 8 7 12 19 9 24 7 1-5 3-9 5-11-15-2-30-7-30-31 0-7 2-13 7-18-1-2-3-9 1-18 0 0 6-2 20 7 6-2 12-2 18-2s12 1 18 2c14-9 20-7 20-7 4 9 2 16 1 18 5 5 7 11 7 18 0 24-15 29-30 31 3 2 5 7 5 14v29c0 3 2 5 5 4 26-8 44-32 44-60 0-35-28-63-63-63z" fill="#FFFBF5"/>
    <text x="170" y="222" text-anchor="middle" class="sans brown" font-size="38" font-weight="500">GitHub</text>
  </g>

  <g transform="translate(615 335)">
    <path class="line" d="M0 115h104"/>
    <path d="M104 115l-30-22v44z" class="accent"/>
    <g transform="translate(155 0)" filter="url(#shadow)">
      <rect class="card" width="250" height="230" rx="36"/>
      <circle cx="83" cy="68" r="18" class="accent"/>
      <circle cx="83" cy="162" r="18" class="accent"/>
      <circle cx="168" cy="116" r="18" class="accent"/>
      <path d="M83 86v58" class="line"/>
      <path d="M83 86c70 0 25 30 85 30" class="line"/>
      <text x="125" y="214" text-anchor="middle" class="sans brown" font-size="32" font-weight="500">Pull Request</text>
    </g>
    <path class="line" d="M430 115h44"/>
    <path d="M474 115l-30-22v44z" class="accent"/>
  </g>

  <g transform="translate(1098 320)" filter="url(#shadow)">
    <rect class="card" width="340" height="260" rx="36"/>
    <g transform="translate(72 52)">
      <path d="M76 64c13-28 50-38 76-19 13 9 21 23 24 38 25 2 45 23 45 49 0 27-22 49-49 49H58c-32 0-58-26-58-58 0-29 22-54 51-58 8-1 16-1 25-1z" fill="url(#cf)"/>
      <path d="M86 61c12-18 36-24 55-12 9 6 16 16 18 27 9-2 18-2 27 1-6-27-28-49-57-53-24-3-42 11-43 37z" fill="#FFB07A" opacity="0.85"/>
    </g>
    <text x="170" y="222" text-anchor="middle" class="sans brown" font-size="38" font-weight="500">Cloudflare</text>
  </g>

  <g transform="translate(444 703)">
    <rect width="712" height="72" rx="36" fill="#FFFDFB" stroke="#EBD5C1" stroke-width="2"/>
    <circle cx="52" cy="36" r="20" class="accent"/>
    <path d="M43 37l7 7 15-18" fill="none" stroke="#FFFBF5" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="96" y="46" class="mono brown" font-size="25">preview/pr-42 → app-pr-42.workers.dev</text>
  </g>
</svg>

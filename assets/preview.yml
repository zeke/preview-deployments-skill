name: Preview Deployment

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - closed

permissions:
  contents: read
  deployments: write

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # Before copying this template, recheck the latest stable tags for
      # actions/checkout and actions/setup-node. Last checked 2026-06-23:
      # actions/checkout@v7.0.0, actions/setup-node@v6.4.0.
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run preview:deploy
        env:
          PREVIEW_PR_NUMBER: ${{ github.event.pull_request.number }}
          PREVIEW_SHA: ${{ github.event.pull_request.head.sha }}
          PREVIEW_REF: ${{ github.event.pull_request.head.ref }}
          GITHUB_TOKEN: ${{ github.token }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  destroy-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # Before copying this template, recheck the latest stable tags for
      # actions/checkout and actions/setup-node. Last checked 2026-06-23:
      # actions/checkout@v7.0.0, actions/setup-node@v6.4.0.
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run preview:destroy
        env:
          PREVIEW_PR_NUMBER: ${{ github.event.pull_request.number }}
          PREVIEW_SHA: ${{ github.event.pull_request.head.sha }}
          PREVIEW_REF: ${{ github.event.pull_request.head.ref }}
          GITHUB_TOKEN: ${{ github.token }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

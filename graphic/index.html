<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>preview-deployments-skill graphic</title>
    <style>
      :root {
        color-scheme: light;
        --cf-orange: #ff4801;
        --cf-brown: #521000;
        --cf-cream: #fffbf5;
        --cf-card: #fffdfb;
        --cf-border: #ebd5c1;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: var(--cf-cream);
        color: var(--cf-brown);
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(100vw, 1600px);
        aspect-ratio: 16 / 9;
        padding: 0;
      }

      img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .export-note {
        position: fixed;
        right: 18px;
        bottom: 18px;
        border: 1px solid var(--cf-border);
        border-radius: 9999px;
        background: var(--cf-card);
        color: rgba(82, 16, 0, 0.7);
        padding: 10px 16px;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main aria-label="Preview deployments skill hero graphic">
      <img src="../assets/preview-deployments-skill-hero.svg" alt="Preview deployments flow: GitHub pull request to GitHub Actions to Cloudflare Workers and GitHub Deployment status." />
    </main>
    <div class="export-note">16:9 source, export at 1600×900 or 3200×1800</div>
  </body>
</html>
